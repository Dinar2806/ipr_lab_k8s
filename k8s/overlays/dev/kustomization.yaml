apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: messager-dev

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests
        value: {cpu: "50m", memory: "64Mi"}
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits
        value: {cpu: "100m", memory: "128Mi"}

images:
  - name: mablinov2704/bff
    newTag: latest
  - name: mablinov2704/frontend
    newTag: latest
  - name: mablinov2704/user-service
    newTag: latest
  - name: mablinov2704/message-service
    newTag: latest
